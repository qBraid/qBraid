name: Bug report 🚩
description: Report something that's broken or behaving incorrectly in the qBraid-SDK
title: "[BUG] "
labels: ["bug 🐛"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more specific you can be, the faster we can fix it.

        Before submitting, please search [existing issues](https://github.com/qBraid/qBraid/issues?q=is%3Aissue) and the [documentation](https://docs.qbraid.com/sdk/user-guide/overview).

  - type: textarea
    id: about
    attributes:
      label: Environment — output of `qbraid.about()`
      description: |
        Please paste the output of the following command:
        - **Terminal:** `python3 -c "import qbraid; qbraid.about()"`
        - **Python shell / Jupyter:**
          ```python
          import qbraid
          qbraid.about()
          ```
      value: |
        ```
        Paste the output here...
        ```
    validations:
      required: true

  - type: dropdown
    id: sdk-version
    attributes:
      label: qBraid-SDK version
      description: Pick the version you're on. If you're not sure, run `pip show qbraid` or check `qbraid.__version__`.
      options:
        - "latest (0.12.x)"
        - "0.11.x"
        - "0.10.x"
        - "older (please mention in the description)"
        - "unsure"
    validations:
      required: true

  - type: dropdown
    id: bug-area
    attributes:
      label: Affected area
      description: Where in the SDK did the bug happen? You can select more than one.
      multiple: true
      options:
        - transpiler / conversion
        - runtime / job submission
        - provider integration
        - QASM parser
        - QIR
        - visualization
        - Jupyter / qBraid Lab
        - documentation
        - installation / packaging
        - other
    validations:
      required: true

  - type: dropdown
    id: in-lab
    attributes:
      label: Running in qBraid Lab?
      description: Did this bug occur while using a pre-built environment in qBraid Lab?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: A minimal, self-contained example that demonstrates the bug. The shorter the better.
      placeholder: |
        1. ...
        2. ...
        3. ...
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages.
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback / logs (optional)
      description: If you got a traceback or relevant log output, paste it here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: suggestions
    attributes:
      label: Suggested fix or additional context (optional)
      description: We welcome any ideas about the root cause, a candidate fix, or pointers to related code.
    validations:
      required: false
