name: Cross-Repo Integration Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number in this repo to post results to (optional)'
        type: string
        default: ''
      qbraid_branch:
        description: 'qBraid SDK branch (leave empty to use current default branch)'
        type: string
        default: ''
      qbraid_core_branch:
        description: 'qbraid-core branch (leave empty to use release version)'
        type: string
        default: ''
      pyqasm_branch:
        description: 'pyqasm branch (leave empty to use release version)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  cross-repo-test:
    runs-on: ubuntu-latest

    env:
      QBRAID_BRANCH: ${{ inputs.qbraid_branch }}
      QBRAID_CORE_BRANCH: ${{ inputs.qbraid_core_branch }}
      PYQASM_BRANCH: ${{ inputs.pyqasm_branch }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.qbraid_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install current repo
        run: |
          python3 -m pip install --upgrade pip setuptools
          python3 -m pip install -r requirements-dev.txt
          python3 -m pip install .

      - name: Override qbraid-core from branch
        if: ${{ inputs.qbraid_core_branch != '' }}
        run: |
          pip install "git+https://${{ secrets.CROSS_REPO_TOKEN }}@github.com/qBraid/qbraid-core.git@${QBRAID_CORE_BRANCH}"

      - name: Override pyqasm from branch
        if: ${{ inputs.pyqasm_branch != '' }}
        run: |
          pip install "git+https://${{ secrets.CROSS_REPO_TOKEN }}@github.com/qBraid/pyqasm.git@${PYQASM_BRANCH}"

      - name: Log installed versions
        run: |
          pip show qbraid-core 2>/dev/null | grep -E "^(Name|Version)" || echo "qbraid-core: not installed"
          pip show pyqasm 2>/dev/null | grep -E "^(Name|Version)" || echo "pyqasm: not installed"

      - name: Run tests
        id: tests
        run: |
          pytest tests \
            --tb=line \
            --no-header \
            --junit-xml=report.xml \
            -q 2>&1 | tee pytest-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          QBRAID_RUN_REMOTE_TESTS: False
        continue-on-error: true

      # Run even if pytest crashes (e.g. import error, segfault) so we always get a summary
      - name: Generate summary and post to PR
        if: always()
        run: python .github/scripts/parse_test_report.py
        env:
          REPORT_XML: report.xml
          SUMMARY_OUTPUT: test-summary.md
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}

      # Ensure workflow fails after summary is posted, not before
      - name: Fail if tests failed
        if: always()
        run: |
          EXIT_CODE="${{ steps.tests.outputs.exit_code }}"
          if [ -z "$EXIT_CODE" ]; then
            echo "Tests step did not run or produce an exit code"
            exit 1
          elif [ "$EXIT_CODE" != "0" ]; then
            echo "Tests failed with exit code $EXIT_CODE"
            exit 1
          fi
